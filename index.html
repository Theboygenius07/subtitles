  <meta name="theme-color" content="#0a0a0a">
  <link rel="preconnect" href="https://api.fontshare.com">
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
        "gsap":  "https://cdn.jsdelivr.net/npm/gsap@3.12.5/+esm"

    }

</head>
<body>

  <nav id="nav">
    <div class="nav-logo">S</div>
    <button class="nav-info-btn" aria-label="About">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <circle cx="9" cy="9" r="8" stroke="currentColor" stroke-width="1.4"/>
        <path d="M9 8v5M9 5.5v.8" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      </svg>
    </button>
  </nav>

  <main id="main">
    <div id="view-horizontal" class="view active"></div>
    <div id="view-vertical"   class="view"></div>
    <div id="view-freeform"   class="view"></div>
    <div id="view-globe"      class="view"></div>
    <div id="view-gallery"    class="view"></div>
  </main>

  <div id="control-panel">
    <div class="cp-group">
      <button class="cp-btn cp-filter" id="filterBtn">
        <span>All</span>
        <svg width="10" height="6" viewBox="0 0 10 6" fill="none" aria-hidden="true">
          <path d="M1 1l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <button class="cp-btn cp-view-btn active" data-view="horizontal" aria-label="Horizontal">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <path d="M12.417 1.96c.722 0 1.307.577 1.307 1.29v9.185c0 .712-.585 1.289-1.307 1.289h-1.96c-.722 0-1.307-.577-1.307-1.29V3.25c0-.712.585-1.289 1.307-1.289h1.96z" stroke="currentColor" stroke-width="1.307" stroke-linecap="round" stroke-linejoin="round"/>

      </button>
      <button class="cp-btn cp-view-btn" data-view="vertical" aria-label="Vertical">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <path d="M13.724 12.417c0 .722-.577 1.307-1.289 1.307H3.25c-.712 0-1.289-.585-1.289-1.307v-1.96c0-.722.577-1.307 1.289-1.307h9.185c.712 0 1.289.585 1.289 1.307v1.96z" stroke="currentColor" stroke-width="1.307" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M13.724 3.267c0-.722-.577-1.307-1.289-1.307H3.25c-.712 0-1.289.585-1.289 1.307v1.96c0 .722.577 1.307 1.289 1.307h9.185c.712 0 1.289-.585 1.289-1.307v-1.96z" stroke="currentColor" stroke-width="1.307" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <button class="cp-btn cp-view-btn" data-view="freeform" aria-label="Canvas">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <path d="M12.417 1.96c.722 0 1.307.577 1.307 1.29v2.2c0 .712-.585 1.289-1.307 1.289h-1.96c-.722 0-1.307-.577-1.307-1.29V3.25c0-.712.585-1.289 1.307-1.289h1.96z" stroke="currentColor" stroke-width="1.307" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M3.268 1.96c-.722 0-1.307.577-1.307 1.29v2.2c0 .712.585 1.289 1.307 1.289h1.96c.722 0 1.307-.577 1.307-1.29V3.25c0-.712-.585-1.289-1.307-1.289h-1.96z" stroke="currentColor" stroke-width="1.307" stroke-linecap="round" stroke-linejoin="round"/>

          <path d="M3.268 8.945c-.722 0-1.307.577-1.307 1.29v2.2c0 .712.585 1.289 1.307 1.289h1.96c.722 0 1.307-.577 1.307-1.29v-2.2c0-.712-.585-1.289-1.307-1.289h-1.96z" stroke="currentColor" stroke-width="1.307" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
    <div class="cp-group">
      <button class="cp-btn cp-view-btn" data-view="gallery" aria-label="Gallery">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">

        </svg>
      </button>
      <button class="cp-btn" id="bgToggle" aria-label="Toggle background">
        <svg width="16" height="16" viewBox="-2.25 -1.08 16 16" fill="none" aria-hidden="true">
          <path d="M7.71 0.653V3.005c0 .433.351.784.784.784h2.352M9.67 1.829C9.32 1.517 8.959 1.147 8.73.906A.794.794 0 0 0 8.147.653H2.221C1.355.653.653 1.355.653 2.221L.653 11.63c0 .866.702 1.567 1.568 1.567l7.056.001c.866 0 1.568-.702 1.568-1.568L10.846 3.318a.796.796 0 0 0-.216-.538C10.373 2.513 9.943 2.074 9.67 1.83z" stroke="currentColor" stroke-width="1.307" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <button class="cp-btn" id="themeToggle" aria-label="Toggle theme">

        <svg class="icon-moon" width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <path d="M14.112 9.565a6.26 6.26 0 0 1-1.862.275 6.272 6.272 0 0 1-6.27-6.27c0-.648.096-1.273.274-1.862A6.272 6.272 0 0 0 7.978 14.112a6.272 6.272 0 0 0 6.134-4.547z" stroke="currentColor" stroke-width="1.31" stroke-linejoin="round"/>
        </svg>
      </button>
      <button class="cp-btn" id="trackToggle" aria-label="Toggle hand tracking">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">

      </button>
    </div>
  </div>

  <div id="cam-preview"></div>

  <script type="module" src="main.js"></script>
</body>
</html>
